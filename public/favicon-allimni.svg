<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 120">
    <defs>
        <linearGradient id="bulbGradient" x1="0%" y1="0%" x2="100%" y2="0%">
            <stop offset="0%" style="stop-color:#3B82F6;stop-opacity:1" />
            <stop offset="100%" style="stop-color:#F59E0B;stop-opacity:1" />
        </linearGradient>
    </defs>
    
    <!-- Bulb Glass Body -->
    <path d="M50,15 C30,15 15,30 15,50 C15,65 25,75 35,85 L35,95 L65,95 L65,85 C75,75 85,65 85,50 C85,30 70,15 50,15 Z" 
          fill="url(#bulbGradient)" opacity="0.15" />
    <path d="M50,15 C30,15 15,30 15,50 C15,65 25,75 35,85 L35,95 C40,95 45,95 50,95 L50,15" fill="#3B82F6" fill-opacity="0.8" />
    <path d="M50,15 C70,15 85,30 85,50 C85,65 75,75 65,85 L65,95 C60,95 55,95 50,95 L50,15" fill="#F59E0B" fill-opacity="0.8" />

    <!-- Graduation Cap -->
    <g class="cap" fill="#1E3A8A">
        <path d="M30,40 L50,30 L70,40 L50,50 Z" />
        <path d="M40,43 L40,50 C40,55 60,55 60,50 L60,43" />
        <path d="M68,39 L68,48" stroke="#F59E0B" stroke-width="1.5" />
        <circle cx="68" cy="49" r="1.5" fill="#F59E0B" />
    </g>

    <!-- Open Book -->
    <g class="book" transform="translate(32, 58)">
        <path d="M0,5 Q9,0 18,5 L18,15 Q9,10 0,15 Z" fill="#111827" />
        <path d="M36,5 Q27,0 18,5 L18,15 Q27,10 36,15 Z" fill="#111827" />
    </g>

    <!-- Bulb Base (Threading) -->
    <g class="bulb-base" fill="#1E3A8A">
        <rect x="35" y="95" width="30" height="4" rx="2" />
        <rect x="37" y="101" width="26" height="4" rx="2" />
        <rect x="40" y="107" width="20" height="4" rx="2" />
        <path d="M45,111 L55,111 L50,116 Z" />
    </g>
</svg>
